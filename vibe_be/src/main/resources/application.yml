spring:
  application:
    name: vibe-be
  datasource:
    url: jdbc:mysql://localhost:3306/vibe_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  jackson:
    time-zone: Asia/Seoul

server:
  port: 8080

logging:
  level:
    org.hibernate.SQL: debug

jwt:
  secret: your-very-long-secret-key-for-jwt-token-generation-change-this
  access-token-expiration: 3600000
